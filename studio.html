<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Insight Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Outfit:wght@200;300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
:root { --accent:#b8a47a; --bg:#05050a; --text:#f5f0e8; --border:rgba(255,255,255,0.08); }
html,body { width:100%; height:100%; background:var(--bg); color:var(--text); font-family:'Outfit',sans-serif; overflow:hidden; }

/* Layout */
#studio { display:grid; grid-template-rows:44px 1fr 48px; height:100vh; }

/* Header */
#studio-header { display:flex; align-items:center; justify-content:space-between; padding:0 20px; border-bottom:0.5px solid var(--border); background:rgba(5,5,10,0.98); }
#studio-title { font-family:'Cormorant Garamond',serif; font-size:16px; font-weight:300; letter-spacing:0.2em; text-transform:uppercase; color:rgba(232,224,208,0.9); }
#subject-tabs { display:flex; gap:0; }
.subj-tab { padding:0 16px; height:44px; display:flex; align-items:center; font-size:8px; font-weight:300; letter-spacing:0.16em; text-transform:uppercase; cursor:pointer; transition:all 0.2s; color:rgba(232,224,208,0.4); border-bottom:2px solid transparent; gap:6px; }
.subj-tab:hover { color:rgba(232,224,208,0.7); }
.subj-tab.active { color:var(--tab-accent,var(--accent)); border-bottom-color:var(--tab-accent,var(--accent)); }
.subj-tab-dot { width:5px; height:5px; border-radius:50%; background:var(--tab-accent,var(--accent)); opacity:0.6; flex-shrink:0; }
.subj-tab.active .subj-tab-dot { opacity:1; }

/* Body */
#studio-body { display:grid; grid-template-columns:320px 1fr; overflow:hidden; }

/* Left — script */
#script-panel { border-right:0.5px solid var(--border); display:flex; flex-direction:column; }
#script-header { padding:10px 14px; border-bottom:0.5px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.label { font-size:8px; font-weight:300; letter-spacing:0.26em; text-transform:uppercase; color:rgba(232,224,208,0.5); }
#wpm-info { font-size:8px; font-weight:200; letter-spacing:0.14em; color:rgba(232,224,208,0.35); }
#word-display { flex:1; padding:14px 16px; overflow-y:auto; font-family:'Cormorant Garamond',serif; font-size:16px; font-weight:300; line-height:2.2; color:rgba(232,224,208,0.9); letter-spacing:0.02em; scrollbar-width:none; display:none; }
#word-display::-webkit-scrollbar { display:none; }
#raw-wrap { flex:1; display:flex; flex-direction:column; gap:8px; padding:12px 14px; }
#script-textarea { flex:1; background:rgba(255,255,255,0.03); border:0.5px solid rgba(255,255,255,0.08); color:rgba(232,224,208,0.85); font-family:'Outfit',sans-serif; font-size:11px; font-weight:200; line-height:1.7; padding:8px 10px; resize:none; outline:none; border-radius:2px; }
#script-textarea::placeholder { color:rgba(232,224,208,0.25); }
#btn-parse { padding:7px; font-size:8px; font-weight:300; letter-spacing:0.2em; text-transform:uppercase; border:0.5px solid rgba(255,255,255,0.12); border-radius:2px; cursor:pointer; color:rgba(232,224,208,0.6); background:transparent; transition:all 0.25s; }
#btn-parse:hover { color:var(--accent); border-color:var(--accent); }

/* Word tokens */
.sw { display:inline; cursor:pointer; border-radius:2px; padding:1px 3px; margin:0 1px; transition:background 0.15s; }
.sw:hover { background:rgba(255,255,255,0.1); }
.sw.tagged { color:rgba(5,5,10,0.95); font-weight:400; }
.sw.selected { outline:2px solid rgba(255,255,255,0.6); outline-offset:1px; }

/* Right — word editor */
#word-editor-panel { display:flex; flex-direction:column; padding:20px; gap:14px; overflow-y:auto; scrollbar-width:none; }
#word-editor-panel::-webkit-scrollbar { display:none; }
#editor-empty { display:flex; align-items:center; justify-content:center; height:100%; }
#editor-empty p { font-size:11px; font-weight:200; color:rgba(232,224,208,0.25); letter-spacing:0.1em; text-align:center; line-height:1.8; }
#word-editor { display:none; flex-direction:column; gap:12px; }
#we-word { font-family:'Cormorant Garamond',serif; font-size:28px; font-weight:300; color:rgba(232,224,208,0.95); letter-spacing:0.06em; }
#we-time { font-size:9px; font-weight:200; color:rgba(232,224,208,0.35); letter-spacing:0.16em; text-transform:uppercase; }
.row { display:flex; flex-direction:column; gap:5px; }
.row-label { font-size:8px; font-weight:200; letter-spacing:0.2em; text-transform:uppercase; color:rgba(232,224,208,0.45); }
select, input[type=text] { background:rgba(255,255,255,0.04); border:0.5px solid rgba(255,255,255,0.1); color:rgba(232,224,208,0.9); font-family:'Outfit',sans-serif; font-size:11px; padding:7px 9px; border-radius:2px; outline:none; width:100%; }
.swatches { display:flex; gap:5px; align-items:center; }
.swatch { width:18px; height:18px; border-radius:50%; cursor:pointer; border:2px solid transparent; transition:transform 0.15s,border-color 0.15s; flex-shrink:0; }
.swatch:hover { transform:scale(1.2); }
.swatch.active { border-color:rgba(255,255,255,0.7); transform:scale(1.15); }
#we-color-picker { width:26px; height:26px; border:none; background:none; padding:0; cursor:pointer; border-radius:50%; overflow:hidden; flex-shrink:0; }
.pills { display:flex; gap:6px; }
.pill { flex:1; padding:6px 4px; font-size:8px; font-weight:300; letter-spacing:0.14em; text-transform:uppercase; text-align:center; border:0.5px solid rgba(255,255,255,0.1); border-radius:2px; cursor:pointer; transition:all 0.2s; color:rgba(232,224,208,0.5); }
.pill:hover { color:rgba(232,224,208,0.8); border-color:rgba(232,224,208,0.3); }
.pill.active { color:var(--accent); border-color:var(--accent); background:rgba(255,255,255,0.03); }
#custom-row { display:none; flex-direction:column; gap:7px; }
#we-custom-input { width:100%; background:rgba(255,255,255,0.04); border:0.5px solid rgba(255,255,255,0.1); color:rgba(232,224,208,0.9); font-family:'Outfit',sans-serif; font-size:11px; padding:7px 9px; border-radius:2px; outline:none; }
#we-custom-input::placeholder { color:rgba(232,224,208,0.25); }
.gen-row { display:flex; gap:8px; align-items:center; }
#btn-gen { padding:6px 12px; font-size:8px; font-weight:300; letter-spacing:0.18em; text-transform:uppercase; border:0.5px solid rgba(255,255,255,0.15); border-radius:2px; cursor:pointer; color:rgba(232,224,208,0.6); background:transparent; transition:all 0.25s; white-space:nowrap; }
#btn-gen:hover { color:var(--accent); border-color:var(--accent); }
#gen-status { font-size:9px; color:rgba(232,224,208,0.4); }
#preview-canvas-wrap { display:none; }
#preview-canvas { width:100%; height:60px; display:block; background:rgba(255,255,255,0.02); border:0.5px solid rgba(255,255,255,0.06); border-radius:2px; }
.actions { display:flex; gap:8px; margin-top:4px; }
.btn { flex:1; padding:8px; font-size:8px; font-weight:300; letter-spacing:0.18em; text-transform:uppercase; border:0.5px solid rgba(255,255,255,0.12); background:transparent; color:rgba(232,224,208,0.7); border-radius:2px; cursor:pointer; transition:all 0.2s; }
.btn:hover { color:rgba(232,224,208,0.95); border-color:rgba(232,224,208,0.4); }
.btn.primary { border-color:var(--accent); color:var(--accent); }
.btn.primary:hover { background:rgba(184,164,122,0.08); }
.btn.danger:hover { color:#c84040; border-color:#c84040; }

/* Playbar */
#playbar { display:flex; align-items:center; gap:14px; padding:0 20px; border-top:0.5px solid var(--border); background:rgba(5,5,10,0.98); }
#btn-play { display:flex; align-items:center; gap:8px; padding:6px 14px; border:0.5px solid rgba(255,255,255,0.12); border-radius:2px; cursor:pointer; font-size:9px; font-weight:300; letter-spacing:0.2em; text-transform:uppercase; color:rgba(232,224,208,0.6); transition:all 0.25s; }
#btn-play:hover, #btn-play.playing { border-color:var(--accent); color:var(--accent); }
#elapsed, #total { font-size:10px; font-weight:200; letter-spacing:0.1em; color:rgba(232,224,208,0.5); font-variant-numeric:tabular-nums; }
#playbar-right { margin-left:auto; display:flex; align-items:center; gap:10px; }
#saves { display:flex; gap:6px; align-items:center; }
.save-slot { padding:5px 10px; border:0.5px solid rgba(255,255,255,0.08); border-radius:2px; cursor:pointer; font-size:8px; font-weight:300; letter-spacing:0.16em; text-transform:uppercase; color:rgba(232,224,208,0.5); transition:all 0.2s; position:relative; }
.save-slot:hover { color:rgba(232,224,208,0.8); border-color:rgba(232,224,208,0.3); }
.save-slot.has-data::before { content:''; position:absolute; top:3px; right:3px; width:4px; height:4px; border-radius:50%; background:var(--accent); }
#btn-save { padding:5px 12px; border:0.5px solid rgba(255,255,255,0.1); border-radius:2px; cursor:pointer; font-size:8px; font-weight:300; letter-spacing:0.16em; text-transform:uppercase; color:rgba(232,224,208,0.5); background:transparent; transition:all 0.2s; }
#btn-save:hover { color:var(--accent); border-color:var(--accent); }
#toast { position:fixed; bottom:60px; left:50%; transform:translateX(-50%) translateY(10px); background:rgba(10,10,18,0.96); border:0.5px solid rgba(255,255,255,0.12); border-radius:3px; padding:8px 18px; font-size:10px; font-weight:200; letter-spacing:0.18em; text-transform:uppercase; color:rgba(232,224,208,0.8); opacity:0; transition:opacity 0.3s,transform 0.3s; pointer-events:none; z-index:9000; }
#toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div id="studio">

  <div id="studio-header">
    <div id="studio-title">I<span style="color:var(--accent)">N</span>SIGHT Studio</div>
    <div id="subject-tabs"><!-- injected by JS --></div>
  </div>

  <div id="studio-body">

    <div id="script-panel">
      <div id="script-header">
        <div class="label">Script</div>
        <div id="wpm-info">130 wpm</div>
      </div>
      <div id="word-display"></div>
      <div id="raw-wrap">
        <textarea id="script-textarea" placeholder="Paste your script here..."></textarea>
        <button id="btn-parse">Parse words</button>
      </div>
    </div>

    <div id="word-editor-panel">
      <div id="editor-empty"><p>Click any word<br>to assign a transformation</p></div>
      <div id="word-editor">
        <div id="we-word"></div>
        <div id="we-time"></div>
        <div class="row">
          <div class="row-label">Shape</div>
          <select id="we-shape">
            <option value="">-- None --</option>
            <option value="human">Avatar -- Human</option>
            <option value="vortex">Hell -- Vortex</option>
            <option value="expand">Hope -- Expand</option>
            <option value="cube">Cube Mind</option>
            <option value="text">Word in particles</option>
            <option value="custom">AI Custom shape</option>
          </select>
        </div>
        <div id="custom-row">
          <div class="row-label">Describe the shape</div>
          <input type="text" id="we-custom-input" placeholder="a flame, a cat, a tree...">
          <div class="gen-row">
            <button id="btn-gen">Generate</button>
            <span id="gen-status"></span>
          </div>
          <div id="preview-canvas-wrap"><canvas id="preview-canvas" height="60"></canvas></div>
        </div>
        <div class="row">
          <div class="row-label">Color</div>
          <div class="swatches">
            <div class="swatch" data-color="#b8a47a" style="background:#b8a47a"></div>
            <div class="swatch" data-color="#9b3f3f" style="background:#9b3f3f"></div>
            <div class="swatch" data-color="#6b9ea8" style="background:#6b9ea8"></div>
            <div class="swatch" data-color="#00c8ff" style="background:#00c8ff"></div>
            <div class="swatch" data-color="#9b7ec8" style="background:#9b7ec8"></div>
            <div class="swatch" data-color="#c87e9b" style="background:#c87e9b"></div>
            <div class="swatch" data-color="#e8e0d0" style="background:#e8e0d0"></div>
            <input type="color" id="we-color-picker" value="#b8a47a">
          </div>
        </div>
        <div class="row">
          <div class="row-label">Transition</div>
          <div class="pills">
            <div class="pill active" data-trans="smooth">Smooth</div>
            <div class="pill" data-trans="explosion">Explosion</div>
          </div>
        </div>
        <div class="actions">
          <button class="btn primary" id="btn-preview">Preview</button>
          <button class="btn" id="btn-apply">Apply</button>
          <button class="btn danger" id="btn-remove">Remove</button>
        </div>
      </div>
    </div>

  </div>

  <div id="playbar">
    <div id="btn-play">
      <svg width="8" height="10" viewBox="0 0 10 12"><polygon points="0,0 10,6 0,12" fill="currentColor"/></svg>
      Play
    </div>
    <div id="elapsed">0:00</div>
    <div style="font-size:9px;color:rgba(232,224,208,0.2);">/</div>
    <div id="total">0:00</div>
    <div id="playbar-right">
      <div id="saves">
        <button id="btn-save">Save</button>
        <div class="save-slot" data-slot="1">S1</div>
        <div class="save-slot" data-slot="2">S2</div>
        <div class="save-slot" data-slot="3">S3</div>
      </div>
    </div>
  </div>

</div>
<div id="toast"></div>

<script>
const WPM = 130;
const VERCEL = 'https://insight-five-phi.vercel.app/api/insight';
const bc = new BroadcastChannel('insight_studio');

// ── Subjects ──
const subjects = [
  {id:0,title:'Avatar',accent:'#b8a47a',shape:'human'},
  {id:1,title:'Hell & Darkness',accent:'#9b3f3f',shape:'vortex'},
  {id:2,title:'Hope',accent:'#6b9ea8',shape:'expand'},
  {id:3,title:'Cube Mind',accent:'#00c8ff',shape:'cube'}
];

// ── Per-subject data ──
const SD = {};
subjects.forEach(s=>{ SD[s.id]={script:'',words:[],dur:0}; });
let currentSubjId = 0;
function sd(){ return SD[currentSubjId]; }
function fmtTime(s){const m=Math.floor(s/60),sec=Math.floor(s%60);return m+':'+sec.toString().padStart(2,'0');}
function hexToRgb(hex){if(!hex||!hex.startsWith('#'))return[184,164,122];return[parseInt(hex.slice(1,3),16),parseInt(hex.slice(3,5),16),parseInt(hex.slice(5,7),16)];}

// ── Build subject tabs ──
function buildTabs(){
  const container = document.getElementById('subject-tabs');
  subjects.forEach(s=>{
    const tab = document.createElement('div');
    tab.className = 'subj-tab';
    tab.dataset.id = s.id;
    tab.style.setProperty('--tab-accent', s.accent);
    tab.innerHTML = `<span class="subj-tab-dot"></span>${s.title}`;
    tab.addEventListener('click', ()=>switchSubject(s.id));
    container.appendChild(tab);
  });
  switchSubject(0);
}

function switchSubject(id){
  saveState();
  currentSubjId = id;
  document.querySelectorAll('.subj-tab').forEach(t=>t.classList.toggle('active',parseInt(t.dataset.id)===id));
  const subj = subjects.find(s=>s.id===id);
  if(subj){ document.documentElement.style.setProperty('--accent',subj.accent); }
  loadState(id);
  bc.postMessage({type:'select_subject', subjectId:id});
}

function saveState(){
  const s = sd();
  s.script = document.getElementById('script-textarea').value;
}

function loadState(id){
  const s = SD[id];
  document.getElementById('script-textarea').value = s.script||'';
  selectedIdx = null;
  document.getElementById('editor-empty').style.display='flex';
  document.getElementById('word-editor').style.display='none';
  if(s.words&&s.words.length){
    renderWords(s.words);
  } else {
    document.getElementById('word-display').style.display='none';
    document.getElementById('raw-wrap').style.display='flex';
  }
  document.getElementById('total').textContent = fmtTime(s.dur||0);
  document.getElementById('elapsed').textContent = '0:00';
}

// ── Parse ──
document.getElementById('btn-parse').addEventListener('click',()=>{
  const text = document.getElementById('script-textarea').value.trim();
  if(!text) return;
  const tokens = text.split(/(\s+)/);
  const words = [];
  let idx = 0;
  tokens.forEach(tok=>{
    if(!tok.trim()) return;
    words.push({text:tok.trim(), idx, tag:null});
    idx++;
  });
  const dur = Math.ceil((words.length/WPM)*60);
  sd().words = words;
  sd().script = text;
  sd().dur = dur;
  document.getElementById('total').textContent = fmtTime(dur);
  renderWords(words);
});

// ── Render words ──
function renderWords(words){
  const display = document.getElementById('word-display');
  const rawWrap = document.getElementById('raw-wrap');
  display.innerHTML = '';
  display.style.display = 'block';
  rawWrap.style.display = 'none';

  const script = sd().script||'';
  const tokens = script.split(/(\s+)/);
  let widx = 0;
  tokens.forEach(tok=>{
    if(/^\s+$/.test(tok)){
      display.appendChild(tok.includes('\n') ? document.createElement('br') : document.createTextNode(' '));
      return;
    }
    if(!tok.trim()) return;
    const word = words[widx];
    if(!word){ widx++; return; }
    const span = document.createElement('span');
    span.className = 'sw';
    span.dataset.idx = widx;
    span.textContent = tok;
    if(word.tag){
      span.classList.add('tagged');
      span.style.background = word.tag.color||'var(--accent)';
    }
    span.addEventListener('click',()=>selectWord(widx, span));
    display.appendChild(span);
    widx++;
  });
}

// ── Select word ──
let selectedIdx = null;
let selectedEl = null;
let editingColor = '#b8a47a';
let customPoints = null;

function selectWord(idx, el){
  if(selectedEl) selectedEl.classList.remove('selected');
  selectedEl = el;
  selectedIdx = idx;
  el.classList.add('selected');

  const word = sd().words[idx];
  const wc = sd().words.length;
  const dur = sd().dur||60;
  const timeAt = (idx/wc)*dur;

  document.getElementById('editor-empty').style.display='none';
  document.getElementById('word-editor').style.display='flex';
  document.getElementById('we-word').textContent = '"'+word.text+'"';
  document.getElementById('we-time').textContent = '~'+fmtTime(timeAt)+' into presentation';

  const tag = word.tag||{};
  document.getElementById('we-shape').value = tag.shape||'';
  editingColor = tag.color||subjects.find(s=>s.id===currentSubjId)?.accent||'#b8a47a';
  document.getElementById('we-color-picker').value = editingColor;
  document.querySelectorAll('.swatch').forEach(s=>s.classList.toggle('active',s.dataset.color===editingColor));
  document.querySelectorAll('.pill').forEach(p=>p.classList.toggle('active',p.dataset.trans===(tag.transition||'smooth')));
  document.getElementById('custom-row').style.display = tag.shape==='custom'?'flex':'none';
  document.getElementById('we-custom-input').value = tag.customPrompt||'';
  document.getElementById('preview-canvas-wrap').style.display = 'none';
  customPoints = tag.customPoints||null;
  if(customPoints) renderPreview(customPoints);
}

// ── Shape change ──
document.getElementById('we-shape').addEventListener('change',function(){
  document.getElementById('custom-row').style.display = this.value==='custom'?'flex':'none';
  const colors = {human:'#b8a47a',vortex:'#9b3f3f',expand:'#6b9ea8',cube:'#00c8ff',text:'#c8a0e0',custom:'#9b7ec8'};
  if(colors[this.value]){
    editingColor = colors[this.value];
    document.getElementById('we-color-picker').value = editingColor;
    document.querySelectorAll('.swatch').forEach(s=>s.classList.toggle('active',s.dataset.color===editingColor));
  }
});

// ── Swatches ──
document.querySelectorAll('.swatch').forEach(s=>{
  s.addEventListener('click',()=>{
    editingColor = s.dataset.color;
    document.getElementById('we-color-picker').value = editingColor;
    document.querySelectorAll('.swatch').forEach(sw=>sw.classList.remove('active'));
    s.classList.add('active');
  });
});
document.getElementById('we-color-picker').addEventListener('input',function(){
  editingColor = this.value;
  document.querySelectorAll('.swatch').forEach(s=>s.classList.remove('active'));
});

// ── Pills ──
document.querySelectorAll('.pill').forEach(p=>{
  p.addEventListener('click',()=>{
    document.querySelectorAll('.pill').forEach(pp=>pp.classList.remove('active'));
    p.classList.add('active');
  });
});

// ── Preview ──
document.getElementById('btn-preview').addEventListener('click',()=>{
  const shape = document.getElementById('we-shape').value;
  if(!shape) return;
  const trans = document.querySelector('.pill.active')?.dataset.trans||'smooth';
  const word = selectedIdx!==null ? sd().words[selectedIdx] : null;
  bc.postMessage({
    type:'preview',
    shape, color:editingColor, transition:trans,
    word: word?.text||'',
    customPoints: shape==='custom'&&customPoints?customPoints:null
  });
});

// ── Apply ──
document.getElementById('btn-apply').addEventListener('click',()=>{
  if(selectedIdx===null) return;
  const shape = document.getElementById('we-shape').value;
  const trans = document.querySelector('.pill.active')?.dataset.trans||'smooth';
  const tag = shape ? {shape, color:editingColor, transition:trans} : null;
  if(shape==='custom'&&customPoints) { tag.customPoints=customPoints; tag.customPrompt=document.getElementById('we-custom-input').value; }
  sd().words[selectedIdx].tag = tag;
  renderWords(sd().words);
  setTimeout(()=>{
    const el = document.querySelector(`.sw[data-idx="${selectedIdx}"]`);
    if(el) selectWord(selectedIdx, el);
  },50);
  const btn = document.getElementById('btn-apply');
  btn.textContent = 'Saved!';
  setTimeout(()=>btn.textContent='Apply',1000);
});

// ── Remove ──
document.getElementById('btn-remove').addEventListener('click',()=>{
  if(selectedIdx===null) return;
  sd().words[selectedIdx].tag = null;
  renderWords(sd().words);
  document.getElementById('editor-empty').style.display='flex';
  document.getElementById('word-editor').style.display='none';
  selectedIdx=null; selectedEl=null;
});

// ── AI Generate ──
document.getElementById('btn-gen').addEventListener('click',async()=>{
  const prompt = document.getElementById('we-custom-input').value.trim();
  if(!prompt) return;
  const btn = document.getElementById('btn-gen');
  const status = document.getElementById('gen-status');
  btn.textContent='...'; btn.disabled=true; status.textContent='Generating...';
  try{
    const res = await fetch(VERCEL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt})});
    const data = await res.json();
    if(data.error) throw new Error(data.error);
    customPoints = data.points;
    renderPreview(customPoints);
    status.textContent = data.points.length+' points';
  } catch(e){ status.textContent='Error: '+e.message; }
  btn.textContent='Regenerate'; btn.disabled=false;
});

function renderPreview(pts){
  if(!pts||!pts.length) return;
  const cv = document.getElementById('preview-canvas');
  const cx = cv.getContext('2d');
  cv.width = cv.offsetWidth||260; cv.height = 60;
  cx.clearRect(0,0,cv.width,cv.height);
  const s = Math.min(cv.width,cv.height)*0.4;
  const [r,g,b] = hexToRgb(editingColor);
  const step = Math.max(1,Math.floor(pts.length/300));
  for(let i=0;i<pts.length;i+=step){
    const[x,y]=pts[i];
    cx.beginPath();cx.arc(x*s+cv.width/2,y*s+cv.height/2,0.9,0,Math.PI*2);
    cx.fillStyle=`rgba(${r},${g},${b},0.8)`;cx.fill();
  }
  document.getElementById('preview-canvas-wrap').style.display='block';
}

// ── Playback ──
let isPlaying=false, playInterval=null, currentPos=0;
const triggeredWords = new Set();

document.getElementById('btn-play').addEventListener('click',()=>{
  isPlaying = !isPlaying;
  const btn = document.getElementById('btn-play');
  btn.classList.toggle('playing',isPlaying);
  btn.innerHTML = isPlaying
    ? '<svg width="8" height="10" viewBox="0 0 10 10"><rect x="0" y="0" width="3" height="10" fill="currentColor"/><rect x="5" y="0" width="3" height="10" fill="currentColor"/></svg> Pause'
    : '<svg width="8" height="10" viewBox="0 0 10 12"><polygon points="0,0 10,6 0,12" fill="currentColor"/></svg> Play';
  if(isPlaying){
    if(currentPos>=0.99){ currentPos=0; triggeredWords.clear(); }
    startPlay();
  } else {
    if(playInterval){clearInterval(playInterval);playInterval=null;}
  }
});

function startPlay(){
  const dur = sd().dur||60;
  if(playInterval) clearInterval(playInterval);
  playInterval = setInterval(()=>{
    if(!isPlaying){clearInterval(playInterval);return;}
    currentPos += 0.1/dur;
    if(currentPos>=1){
      currentPos=1; isPlaying=false; clearInterval(playInterval);
      document.getElementById('btn-play').classList.remove('playing');
      document.getElementById('btn-play').innerHTML='<svg width="8" height="10" viewBox="0 0 10 12"><polygon points="0,0 10,6 0,12" fill="currentColor"/></svg> Play';
      return;
    }
    document.getElementById('elapsed').textContent = fmtTime(currentPos*dur);
    checkWords(currentPos);
  },100);
}

function checkWords(pos){
  const words = sd().words;
  if(!words||!words.length) return;
  const wc = words.length;
  const wordIdx = Math.min(Math.floor(pos*wc), wc-1);
  for(let i=0;i<=wordIdx;i++){
    const word = words[i];
    if(!word||!word.tag) continue;
    const key = currentSubjId+':'+i;
    if(triggeredWords.has(key)) continue;
    triggeredWords.add(key);
    // send command to canvas
    bc.postMessage({
      type:'trigger',
      shape:word.tag.shape,
      color:word.tag.color,
      transition:word.tag.transition,
      word:word.text,
      customPoints:word.tag.customPoints||null
    });
  }
}

// ── Save/Load ──
const PREFIX = 'insight_studio_';
let pendingSlot = null;

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

document.getElementById('btn-save').addEventListener('click',()=>{
  document.querySelectorAll('.save-slot').forEach(s=>{s.style.borderColor='var(--accent)';setTimeout(()=>{s.style.borderColor='';},1800);});
  toast('Click a slot to save'); pendingSlot='pick';
});

document.querySelectorAll('.save-slot').forEach(slot=>{
  slot.addEventListener('click',()=>{
    const key = PREFIX+'slot_'+slot.dataset.slot;
    if(pendingSlot==='pick'){
      saveState();
      localStorage.setItem(key,JSON.stringify({SD:JSON.parse(JSON.stringify(SD)),savedAt:new Date().toLocaleString()}));
      pendingSlot=null; updateSlots(); toast('Saved to slot '+slot.dataset.slot);
    } else {
      const raw = localStorage.getItem(key);
      if(raw){ try{ const d=JSON.parse(raw); Object.keys(d.SD).forEach(id=>{if(SD[id])Object.assign(SD[id],d.SD[id]);}); loadState(currentSubjId); updateSlots(); toast('Loaded slot '+slot.dataset.slot); }catch(e){toast('Error');} }
      else { document.getElementById('btn-save').click(); }
    }
  });
});

function updateSlots(){
  document.querySelectorAll('.save-slot').forEach(slot=>{
    const raw = localStorage.getItem(PREFIX+'slot_'+slot.dataset.slot);
    slot.classList.toggle('has-data',!!raw);
  });
}

// auto-restore slot 1
(function(){ const raw=localStorage.getItem(PREFIX+'slot_1'); if(raw){ try{ const d=JSON.parse(raw); Object.keys(d.SD).forEach(id=>{if(SD[id])Object.assign(SD[id],d.SD[id]);}); }catch(e){} } updateSlots(); })();

buildTabs();
</script>
