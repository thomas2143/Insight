<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Insight Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Outfit:wght@200;300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
:root { --accent:#b8a47a; --bg:#05050a; --border:rgba(255,255,255,0.08); }
html,body { width:100%; height:100vh; overflow:hidden; background:var(--bg); color:#f0ead8; font-family:'Outfit',sans-serif; }

/* ── Layout ── */
#app {
  display:grid;
  grid-template-columns:1fr 320px;
  grid-template-rows:48px 1fr 52px;
  height:100vh;
}

/* ── Header ── */
#header {
  grid-column:1/3;
  display:flex; align-items:center; justify-content:space-between;
  padding:0 24px; border-bottom:0.5px solid var(--border);
  background:rgba(5,5,10,0.98);
}
#header-title { font-family:'Cormorant Garamond',serif; font-size:17px; font-weight:300; letter-spacing:0.22em; text-transform:uppercase; color:rgba(240,234,216,0.9); }
#header-title span { color:var(--accent); }
#subject-tabs { display:flex; }
.s-tab {
  padding:0 16px; height:48px; display:flex; align-items:center; gap:7px;
  font-size:8px; font-weight:300; letter-spacing:0.16em; text-transform:uppercase;
  cursor:pointer; color:rgba(240,234,216,0.75); border-bottom:2px solid transparent;
  transition:all 0.2s; margin-bottom:-0.5px;
}
.s-tab:hover { color:rgba(240,234,216,0.8); }
.s-tab.active { color:var(--tab-c,var(--accent)); border-bottom-color:var(--tab-c,var(--accent)); }
.s-tab-dot { width:5px; height:5px; border-radius:50%; background:var(--tab-c,var(--accent)); opacity:0.5; flex-shrink:0; }
.s-tab.active .s-tab-dot { opacity:1; }
#step-hint {
  font-size:9px; font-weight:200; letter-spacing:0.18em; text-transform:uppercase;
  color:rgba(240,234,216,0.75); padding:4px 12px; border:0.5px solid rgba(255,255,255,0.08);
  border-radius:2px;
}

/* ── Left: preview + script ── */
#left-panel {
  display:grid;
  grid-template-rows:35% 1fr;
  border-right:0.5px solid var(--border);
  overflow:hidden;
  min-height:0;
}

/* Mini canvas */
#preview-wrap {
  position:relative; overflow:hidden; background:#05050a;
  border-bottom:0.5px solid var(--border);
}
#preview-frame {
  width:100%; height:100%; border:none; display:block;
  pointer-events:none;
}
#preview-word {
  position:absolute; bottom:14px; right:20px;
  font-size:9px; font-weight:200; letter-spacing:0.2em; text-transform:uppercase;
  color:rgba(240,234,216,0.85); pointer-events:none;
  font-family:'Outfit',sans-serif; background:rgba(5,5,10,0.7);
  padding:4px 8px; border-radius:2px;
}

/* Script area */
#script-wrap { display:flex; flex-direction:column; overflow:hidden; min-height:0; flex:1; }
#script-toolbar {
  display:flex; align-items:center; justify-content:space-between;
  padding:8px 16px; border-bottom:0.5px solid var(--border); flex-shrink:0;
}
.toolbar-label { font-size:8px; font-weight:200; letter-spacing:0.26em; text-transform:uppercase; color:rgba(240,234,216,0.75); }
#btn-parse {
  padding:5px 14px; font-size:8px; font-weight:300; letter-spacing:0.18em;
  text-transform:uppercase; border:0.5px solid rgba(255,255,255,0.12);
  border-radius:2px; cursor:pointer; color:rgba(240,234,216,0.8);
  background:transparent; transition:all 0.25s;
}
#btn-parse:hover { color:var(--accent); border-color:var(--accent); }

#script-textarea {
  flex:1; min-height:0; background:transparent; border:none; outline:none; resize:none;
  color:rgba(240,234,216,0.75); font-family:'Outfit',sans-serif;
  font-size:12px; font-weight:200; line-height:1.8; padding:14px 16px;
  scrollbar-width:none;
}
#script-textarea::placeholder { color:rgba(240,234,216,0.75); }
#script-textarea::-webkit-scrollbar { display:none; }

#word-display {
  flex:1; min-height:0; padding:14px 16px; overflow-y:auto; scrollbar-width:none;
  font-family:'Cormorant Garamond',serif; font-size:16px; font-weight:300;
  line-height:2.2; color:rgba(240,234,216,0.85); letter-spacing:0.02em;
  display:none;
}
#word-display::-webkit-scrollbar { display:none; }

.sw {
  display:inline; cursor:pointer; border-radius:2px;
  padding:2px 3px; margin:0 1px; transition:all 0.15s;
}
.sw:hover { background:rgba(255,255,255,0.09); }
.sw.tagged { color:rgba(5,5,10,0.95); font-weight:400; border-radius:3px; }
.sw.active { outline:2px solid rgba(255,255,255,0.55); outline-offset:2px; }

/* ── Right: word editor ── */
#right-panel {
  display:flex; flex-direction:column; overflow:hidden;
}

/* Empty state */
#editor-empty {
  flex:1; display:flex; flex-direction:column; align-items:center;
  justify-content:center; gap:16px; padding:24px;
}
#editor-empty-step {
  font-size:11px; font-weight:200; letter-spacing:0.14em;
  color:rgba(240,234,216,0.75); text-align:center; line-height:2;
}
.step-num {
  display:inline-block; width:20px; height:20px; border-radius:50%;
  border:0.5px solid rgba(240,234,216,0.75); font-size:9px; font-weight:300;
  text-align:center; line-height:20px; margin-right:6px;
  color:rgba(240,234,216,0.75);
}

/* Word editor */
#word-editor { flex:1; display:none; flex-direction:column; overflow-y:auto; scrollbar-width:none; }
#word-editor::-webkit-scrollbar { display:none; }

#we-header {
  padding:16px 20px 12px; border-bottom:0.5px solid var(--border); flex-shrink:0;
}
#we-word {
  font-family:'Cormorant Garamond',serif; font-size:26px; font-weight:300;
  color:rgba(240,234,216,0.95); letter-spacing:0.06em; margin-bottom:4px;
}
#we-time { font-size:8px; font-weight:200; letter-spacing:0.2em; text-transform:uppercase; color:rgba(240,234,216,0.75); }

#we-fields { padding:16px 20px; display:flex; flex-direction:column; gap:14px; }

.field { display:flex; flex-direction:column; gap:6px; }
.field-label { font-size:8px; font-weight:200; letter-spacing:0.22em; text-transform:uppercase; color:rgba(240,234,216,0.75); }

select {
  background:rgba(255,255,255,0.04); border:0.5px solid rgba(255,255,255,0.1);
  color:rgba(240,234,216,0.88); font-family:'Outfit',sans-serif; font-size:11px;
  padding:8px 10px; border-radius:2px; outline:none; width:100%; cursor:pointer;
}
select:focus { border-color:rgba(240,234,216,0.75); }

/* custom shape */
#custom-section { display:none; flex-direction:column; gap:8px; }
#we-prompt {
  background:rgba(255,255,255,0.04); border:0.5px solid rgba(255,255,255,0.1);
  color:rgba(240,234,216,0.88); font-family:'Outfit',sans-serif; font-size:11px;
  padding:8px 10px; border-radius:2px; outline:none; width:100%;
}
#we-prompt::placeholder { color:rgba(240,234,216,0.75); }
#we-prompt:focus { border-color:rgba(240,234,216,0.75); }
#btn-generate {
  padding:7px 14px; font-size:8px; font-weight:300; letter-spacing:0.18em;
  text-transform:uppercase; border:0.5px solid rgba(255,255,255,0.15);
  border-radius:2px; cursor:pointer; color:rgba(240,234,216,0.75);
  background:transparent; transition:all 0.25s; align-self:flex-start;
}
#btn-generate:hover { color:var(--accent); border-color:var(--accent); }
#gen-status { font-size:9px; color:rgba(240,234,216,0.75); }
#gen-preview-canvas { width:100%; height:50px; display:none; background:rgba(255,255,255,0.02); border:0.5px solid rgba(255,255,255,0.06); border-radius:2px; }

/* color swatches */
.swatches { display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
.swatch {
  width:20px; height:20px; border-radius:50%; cursor:pointer;
  border:2px solid transparent; transition:transform 0.15s, border-color 0.15s; flex-shrink:0;
}
.swatch:hover { transform:scale(1.18); }
.swatch.active { border-color:rgba(255,255,255,0.65); transform:scale(1.15); }
#color-picker {
  width:28px; height:28px; border:none; background:none;
  padding:0; cursor:pointer; border-radius:50%; overflow:hidden; flex-shrink:0;
}

/* transition pills */
.pills { display:flex; gap:8px; }
.pill {
  flex:1; padding:7px; font-size:8px; font-weight:300; letter-spacing:0.16em;
  text-transform:uppercase; text-align:center; border:0.5px solid rgba(255,255,255,0.1);
  border-radius:2px; cursor:pointer; transition:all 0.2s;
  color:rgba(240,234,216,0.75);
}
.pill:hover { color:rgba(240,234,216,0.75); border-color:rgba(240,234,216,0.75); }
.pill.active { color:var(--accent); border-color:var(--accent); background:rgba(255,255,255,0.03); }

/* actions */
#we-actions {
  padding:14px 20px 18px; display:flex; flex-direction:column; gap:8px; flex-shrink:0;
  border-top:0.5px solid var(--border); margin-top:auto;
}
.action-row { display:flex; gap:8px; }
#btn-preview-apply {
  flex:2; padding:10px; font-size:9px; font-weight:300; letter-spacing:0.2em;
  text-transform:uppercase; border:0.5px solid var(--accent); border-radius:2px;
  cursor:pointer; color:var(--accent); background:transparent; transition:all 0.25s;
}
#btn-preview-apply:hover { background:rgba(184,164,122,0.1); }
#btn-remove {
  flex:1; padding:10px; font-size:9px; font-weight:300; letter-spacing:0.2em;
  text-transform:uppercase; border:0.5px solid rgba(255,255,255,0.1); border-radius:2px;
  cursor:pointer; color:rgba(240,234,216,0.75); background:transparent; transition:all 0.25s;
}
#btn-remove:hover { color:#c84040; border-color:#c84040; }

/* ── Playbar ── */
#playbar {
  grid-column:1/3; display:flex; align-items:center; gap:16px;
  padding:0 24px; border-top:0.5px solid var(--border);
  background:rgba(5,5,10,0.98);
}
#btn-play {
  display:flex; align-items:center; gap:8px; padding:7px 16px;
  border:0.5px solid rgba(255,255,255,0.15); border-radius:2px;
  cursor:pointer; font-size:9px; font-weight:300; letter-spacing:0.2em;
  text-transform:uppercase; color:rgba(240,234,216,0.8); transition:all 0.25s;
}
#btn-play:hover, #btn-play.playing { border-color:var(--accent); color:var(--accent); }
#elapsed, #total { font-size:10px; font-weight:200; color:rgba(240,234,216,0.75); font-variant-numeric:tabular-nums; }
#playbar-sep { color:rgba(240,234,216,0.75); font-size:10px; }

/* progress bar */
#progress-track {
  flex:1; height:2px; background:rgba(255,255,255,0.06);
  border-radius:1px; position:relative; cursor:pointer;
}
#progress-fill { height:100%; background:var(--accent); border-radius:1px; width:0%; transition:width 0.1s linear; }

#playbar-right { margin-left:auto; display:flex; align-items:center; gap:8px; }
#btn-save {
  padding:5px 12px; border:0.5px solid rgba(255,255,255,0.1); border-radius:2px;
  cursor:pointer; font-size:8px; font-weight:300; letter-spacing:0.16em;
  text-transform:uppercase; color:rgba(240,234,216,0.75); background:transparent; transition:all 0.2s;
}
#btn-save:hover { color:var(--accent); border-color:var(--accent); }
.slot {
  padding:5px 10px; border:0.5px solid rgba(255,255,255,0.08); border-radius:2px;
  cursor:pointer; font-size:8px; font-weight:300; letter-spacing:0.16em;
  text-transform:uppercase; color:rgba(240,234,216,0.75); transition:all 0.2s; position:relative;
}
.slot:hover { color:rgba(240,234,216,0.75); border-color:rgba(240,234,216,0.75); }
.slot.filled::after {
  content:''; position:absolute; top:3px; right:3px;
  width:4px; height:4px; border-radius:50%; background:var(--accent);
}

/* connection status */
#canvas-status {
  display:flex; align-items:center; gap:8px; padding:4px 12px;
  border:0.5px solid rgba(255,255,255,0.08); border-radius:2px;
}
#canvas-dot {
  width:6px; height:6px; border-radius:50%;
  background:#444; transition:background 0.4s; flex-shrink:0;
}
#canvas-dot.connected { background:#4a9; animation:pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
#canvas-label {
  font-size:8px; font-weight:200; letter-spacing:0.16em; text-transform:uppercase;
  color:rgba(240,234,216,0.4); white-space:nowrap; transition:color 0.4s;
}
#canvas-label.connected { color:rgba(240,234,216,0.75); }
#btn-open-canvas {
  padding:4px 10px; font-size:8px; font-weight:300; letter-spacing:0.14em;
  text-transform:uppercase; border:0.5px solid rgba(255,255,255,0.12);
  border-radius:2px; cursor:pointer; color:rgba(240,234,216,0.5);
  background:transparent; transition:all 0.2s; white-space:nowrap;
}
#btn-open-canvas:hover { color:var(--accent); border-color:var(--accent); }
#btn-open-canvas.connected { border-color:#4a9; color:#4a9; }

/* toast */
#toast {
  position:fixed; bottom:70px; left:50%; transform:translateX(-50%) translateY(8px);
  background:rgba(10,10,18,0.96); border:0.5px solid rgba(255,255,255,0.12);
  border-radius:3px; padding:8px 20px; font-size:10px; font-weight:200;
  letter-spacing:0.18em; text-transform:uppercase; color:rgba(240,234,216,0.8);
  opacity:0; transition:opacity 0.3s, transform 0.3s; pointer-events:none; z-index:999;
}
#toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div id="app">

  <!-- Header -->
  <div id="header">
    <div id="header-title">I<span>N</span>SIGHT <span style="font-size:11px;letter-spacing:0.3em;color:rgba(240,234,216,0.4);font-family:'Outfit',sans-serif;font-weight:200;">STUDIO</span></div>
    <div id="subject-tabs"></div>
    <div id="step-hint">① Paste script &nbsp;② Click word &nbsp;③ Play</div>
    <div id="canvas-status">
      <div id="canvas-dot"></div>
      <div id="canvas-label">Canvas disconnected</div>
      <button id="btn-open-canvas">Open Canvas</button>
    </div>
  </div>

  <!-- Left panel -->
  <div id="left-panel">

    <!-- Live preview via iframe -->
    <div id="preview-wrap">
      <iframe id="preview-frame" src="index.html" scrolling="no" frameborder="0"></iframe>
      <div id="preview-word"></div>
    </div>

    <!-- Script -->
    <div id="script-wrap">
      <div id="script-toolbar">
        <div class="toolbar-label">Script</div>
        <button id="btn-parse">Parse words →</button>
      </div>
      <textarea id="script-textarea" placeholder="Paste your script here…&#10;&#10;Then click Parse to turn each word into a clickable token."></textarea>
      <div id="word-display"></div>
    </div>

  </div>

  <!-- Right panel — word editor -->
  <div id="right-panel">

    <div id="editor-empty">
      <div id="editor-empty-step">
        <span class="step-num">1</span>Paste your script &amp; click Parse<br>
        <span class="step-num">2</span>Click any word to assign a shape<br>
        <span class="step-num">3</span>Click Preview &amp; Apply, then Play
      </div>
    </div>

    <div id="word-editor">

      <div id="we-header">
        <div id="we-word"></div>
        <div id="we-time"></div>
      </div>

      <div id="we-fields">

        <div class="field">
          <div class="field-label">Shape</div>
          <select id="we-shape">
            <option value="">— No transformation —</option>
            <option value="human">Avatar — Human silhouette</option>
            <option value="vortex">Hell &amp; Darkness — Vortex</option>
            <option value="expand">Hope — Expanding rings</option>
            <option value="cube">Cube Mind — Rotating cube</option>
            <option value="text">Word itself in particles</option>
            <option value="custom">AI — Describe a custom shape</option>
          </select>
        </div>

        <div id="custom-section">
          <div class="field-label">Describe the shape</div>
          <input type="text" id="we-prompt" placeholder="a flame, a cat, a broken heart…">
          <div style="display:flex;align-items:center;gap:10px;">
            <button id="btn-generate">Generate shape</button>
            <span id="gen-status"></span>
          </div>
          <canvas id="gen-preview-canvas" height="50"></canvas>
        </div>

        <div class="field">
          <div class="field-label">Particle color</div>
          <div class="swatches">
            <div class="swatch" data-c="#b8a47a" style="background:#b8a47a" title="Gold"></div>
            <div class="swatch" data-c="#9b3f3f" style="background:#9b3f3f" title="Red"></div>
            <div class="swatch" data-c="#6b9ea8" style="background:#6b9ea8" title="Teal"></div>
            <div class="swatch" data-c="#00c8ff" style="background:#00c8ff" title="Cyan"></div>
            <div class="swatch" data-c="#9b7ec8" style="background:#9b7ec8" title="Purple"></div>
            <div class="swatch" data-c="#c87e9b" style="background:#c87e9b" title="Rose"></div>
            <div class="swatch" data-c="#e8e0d0" style="background:#e8e0d0" title="White"></div>
            <input type="color" id="color-picker" value="#b8a47a" title="Custom color">
          </div>
        </div>

        <div class="field">
          <div class="field-label">How particles transition</div>
          <div class="pills">
            <div class="pill active" data-t="smooth">Smooth drift</div>
            <div class="pill" data-t="explosion">Explosion</div>
          </div>
        </div>

      </div>

      <div id="we-actions">
        <div class="action-row">
          <button id="btn-preview-apply">Preview &amp; Apply</button>
          <button id="btn-remove">Remove</button>
        </div>
      </div>

    </div>

  </div>

  <!-- Playbar -->
  <div id="playbar">
    <button id="btn-play">
      <svg width="8" height="10" viewBox="0 0 10 12"><polygon points="0,0 10,6 0,12" fill="currentColor"/></svg>
      Play
    </button>
    <div id="elapsed">0:00</div>
    <div id="playbar-sep">/</div>
    <div id="total">0:00</div>
    <div id="progress-track"><div id="progress-fill"></div></div>
    <div id="playbar-right">
      <button id="btn-save">Save</button>
      <div class="slot" data-slot="1">S1</div>
      <div class="slot" data-slot="2">S2</div>
      <div class="slot" data-slot="3">S3</div>
    </div>
  </div>

</div>
<div id="toast"></div>

<script>
'use strict';
const WPM = 130;
const VERCEL = 'https://insight-five-phi.vercel.app/api/insight';
const bc = new BroadcastChannel('insight_studio');

// ── Handshake — know when canvas is connected ──
let canvasConnected = false;
let canvasWindow = null;

function setConnected(val){
  canvasConnected = val;
  document.getElementById('canvas-dot').classList.toggle('connected', val);
  document.getElementById('canvas-label').classList.toggle('connected', val);
  document.getElementById('canvas-label').textContent = val ? 'Canvas connected' : 'Canvas disconnected';
  document.getElementById('btn-open-canvas').textContent = val ? 'Connected' : 'Open Canvas';
  document.getElementById('btn-open-canvas').classList.toggle('connected', val);
}

// listen for canvas responses
bc.onmessage = (e) => {
  if(e.data && e.data.type === 'canvas_ready'){
    setConnected(true);
  }
  if(e.data && e.data.type === 'canvas_closed'){
    setConnected(false);
  }
};

// ping canvas every 3 seconds to check if still alive
setInterval(()=>{
  bc.postMessage({type:'studio_ping'});
  // if no response after 4s, mark disconnected
  setTimeout(()=>{
    if(canvasConnected){
      // will be reset by canvas_ready response
    }
  }, 1000);
}, 3000);

// open canvas button
document.getElementById('btn-open-canvas').onclick = ()=>{
  if(canvasWindow && !canvasWindow.closed){
    canvasWindow.focus();
  } else {
    canvasWindow = window.open('index.html', 'insight_canvas',
      'width=1200,height=800,menubar=no,toolbar=no,location=no');
  }
  // ping after short delay to get response
  setTimeout(()=>bc.postMessage({type:'studio_ping'}), 1500);
};

// send ping on load
setTimeout(()=>bc.postMessage({type:'studio_ping'}), 500);

// ── Subjects ──
const SUBJECTS = [
  {id:0, title:'Avatar',        accent:'#b8a47a', rgb:[184,164,122], shape:'human',  chaos:0.26, speed:0.5},
  {id:1, title:'Hell & Dark',   accent:'#9b3f3f', rgb:[155,63,63],   shape:'vortex', chaos:0.94, speed:2.1},
  {id:2, title:'Hope',          accent:'#6b9ea8', rgb:[107,158,168], shape:'expand', chaos:0.09, speed:0.3},
  {id:3, title:'Cube Mind',     accent:'#00c8ff', rgb:[0,200,255],   shape:'cube',   chaos:0.18, speed:0.75}
];

// ── State ──
const SD = {};
SUBJECTS.forEach(s=>{ SD[s.id]={script:'',words:[],dur:0}; });
let subjId = 0;
let selIdx = null, selEl = null;
let editColor = '#b8a47a';
let customPts = null;
let isPlaying = false, playTimer = null, pos = 0;
const done = new Set();

function sd(){ return SD[subjId]; }
function fmt(s){ const m=Math.floor(s/60),sec=Math.floor(s%60); return m+':'+sec.toString().padStart(2,'0'); }
function rgb(hex){ if(!hex||!hex.startsWith('#')) return [184,164,122]; return [parseInt(hex.slice(1,3),16),parseInt(hex.slice(3,5),16),parseInt(hex.slice(5,7),16)]; }

// ── Subject tabs ──
function buildTabs(){
  const bar = document.getElementById('subject-tabs');
  SUBJECTS.forEach(s=>{
    const t = document.createElement('div');
    t.className='s-tab'; t.dataset.id=s.id;
    t.style.setProperty('--tab-c', s.accent);
    t.innerHTML=`<span class="s-tab-dot"></span>${s.title}`;
    t.onclick = ()=>switchSubj(s.id);
    bar.appendChild(t);
  });
}

function switchSubj(id){
  if(sd()) sd().script = document.getElementById('script-textarea').value;
  subjId = id;
  document.querySelectorAll('.s-tab').forEach(t=>t.classList.toggle('active', +t.dataset.id===id));
  const s = SUBJECTS.find(x=>x.id===id);
  document.documentElement.style.setProperty('--accent', s.accent);
  // load state
  const state = sd();
  document.getElementById('script-textarea').value = state.script||'';
  document.getElementById('total').textContent = fmt(state.dur||0);
  document.getElementById('elapsed').textContent = '0:00';
  document.getElementById('progress-fill').style.width = '0%';
  selIdx=null; selEl=null;
  showEmpty();
  if(state.words&&state.words.length) renderWords(state.words);
  else { document.getElementById('word-display').style.display='none'; document.getElementById('script-textarea').style.display='block'; }

  bc.postMessage({type:'select_subject', subjectId:id});
}

// ── Parse ──
document.getElementById('btn-parse').onclick = ()=>{
  const text = document.getElementById('script-textarea').value.trim();
  if(!text) return;
  const words=[], tokens=text.split(/(\s+)/);
  let i=0;
  tokens.forEach(tok=>{ if(tok.trim()){ words.push({text:tok.trim(),idx:i,tag:null}); i++; }});
  const dur = Math.ceil((words.length/WPM)*60);
  Object.assign(sd(), {words, script:text, dur});
  document.getElementById('total').textContent = fmt(dur);
  renderWords(words);
};

// ── Render words ──
function renderWords(words){
  const ta=document.getElementById('script-textarea'), wd=document.getElementById('word-display');
  ta.style.display='none'; wd.style.display='block'; wd.innerHTML='';
  const tokens = (sd().script||'').split(/(\s+)/);
  let wi=0;
  tokens.forEach(tok=>{
    if(/^\s+$/.test(tok)){ wd.appendChild(tok.includes('\n')?document.createElement('br'):document.createTextNode(' ')); return; }
    if(!tok.trim()) return;
    const w=words[wi]; if(!w){wi++;return;}
    const sp=document.createElement('span');
    sp.className='sw'; sp.dataset.i=wi; sp.textContent=tok;
    if(w.tag){ sp.classList.add('tagged'); sp.style.background=w.tag.color||'var(--accent)'; }
    sp.onclick=()=>selectWord(wi,sp);
    wd.appendChild(sp); wi++;
  });
}

// ── Select word ──
function selectWord(idx,el){
  if(selEl) selEl.classList.remove('active');
  selEl=el; selIdx=idx; el.classList.add('active');
  const w=sd().words[idx];
  const wc=sd().words.length, dur=sd().dur||60;
  document.getElementById('editor-empty').style.display='none';
  document.getElementById('word-editor').style.display='flex';
  document.getElementById('we-word').textContent='"'+w.text+'"';
  document.getElementById('we-time').textContent='~'+fmt((idx/wc)*dur)+' into presentation';
  const tag=w.tag||{};
  document.getElementById('we-shape').value=tag.shape||'';
  editColor=tag.color||SUBJECTS.find(s=>s.id===subjId).accent;
  document.getElementById('color-picker').value=editColor;
  document.querySelectorAll('.swatch').forEach(s=>s.classList.toggle('active',s.dataset.c===editColor));
  document.querySelectorAll('.pill').forEach(p=>p.classList.toggle('active',p.dataset.t===(tag.transition||'smooth')));
  document.getElementById('custom-section').style.display=tag.shape==='custom'?'flex':'none';
  document.getElementById('we-prompt').value=tag.customPrompt||'';
  document.getElementById('gen-preview-canvas').style.display='none';
  customPts=tag.customPoints||null;
}

function showEmpty(){
  document.getElementById('editor-empty').style.display='flex';
  document.getElementById('word-editor').style.display='none';
  if(selEl) selEl.classList.remove('active');
  selEl=null; selIdx=null;
}

// ── Shape select ──
document.getElementById('we-shape').onchange = function(){
  document.getElementById('custom-section').style.display=this.value==='custom'?'flex':'none';
  const autoC={human:'#b8a47a',vortex:'#9b3f3f',expand:'#6b9ea8',cube:'#00c8ff',text:'#c8a0e0',custom:'#9b7ec8'}[this.value];
  if(autoC){ editColor=autoC; document.getElementById('color-picker').value=autoC; document.querySelectorAll('.swatch').forEach(s=>s.classList.toggle('active',s.dataset.c===autoC)); }
};

// ── Swatches ──
document.querySelectorAll('.swatch').forEach(s=>s.onclick=()=>{
  editColor=s.dataset.c; document.getElementById('color-picker').value=editColor;
  document.querySelectorAll('.swatch').forEach(x=>x.classList.remove('active')); s.classList.add('active');
});
document.getElementById('color-picker').oninput=function(){
  editColor=this.value; document.querySelectorAll('.swatch').forEach(s=>s.classList.remove('active'));
};

// ── Pills ──
document.querySelectorAll('.pill').forEach(p=>p.onclick=()=>{
  document.querySelectorAll('.pill').forEach(x=>x.classList.remove('active')); p.classList.add('active');
});

// ── Preview & Apply ──
document.getElementById('btn-preview-apply').onclick=()=>{
  if(selIdx===null&&document.getElementById('we-shape').value==='') return;
  const shape=document.getElementById('we-shape').value;
  const trans=document.querySelector('.pill.active')?.dataset.t||'smooth';
  const tag=shape?{shape,color:editColor,transition:trans}:null;
  if(shape==='custom'&&customPts){ tag.customPoints=customPts; tag.customPrompt=document.getElementById('we-prompt').value; }

  // save
  sd().words[selIdx].tag=tag;
  renderWords(sd().words);
  setTimeout(()=>{ const el=document.querySelector(`.sw[data-i="${selIdx}"]`); if(el) selectWord(selIdx,el); },50);

  // update word label
  if(shape){
    const wordText=selIdx!==null?(sd().words[selIdx]?.text||''):'';
    document.getElementById('preview-word').textContent=wordText?'"'+wordText+'"':'';
    document.getElementById('preview-word').style.color=editColor;
  }

  // send to main canvas
  bc.postMessage({type:'preview',shape,color:editColor,transition:trans,word:sd().words[selIdx]?.text||'',customPoints:shape==='custom'&&customPts?customPts:null});

  // feedback
  const btn=document.getElementById('btn-preview-apply');
  btn.textContent='Applied!'; setTimeout(()=>btn.textContent='Preview & Apply',1000);
};

// ── Remove ──
document.getElementById('btn-remove').onclick=()=>{
  if(selIdx===null) return;
  sd().words[selIdx].tag=null;
  renderWords(sd().words); showEmpty();
};

// ── AI Generate ──
document.getElementById('btn-generate').onclick=async()=>{
  const prompt=document.getElementById('we-prompt').value.trim(); if(!prompt) return;
  const btn=document.getElementById('btn-generate'), status=document.getElementById('gen-status');
  btn.textContent='Generating...'; btn.disabled=true; status.textContent='';
  try{
    const res=await fetch(VERCEL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt})});
    const data=await res.json(); if(data.error) throw new Error(data.error);
    customPts=data.points; drawGenPreview(customPts); status.textContent=data.points.length+' pts';
  } catch(e){ status.textContent='Error: '+e.message; }
  btn.textContent='Regenerate'; btn.disabled=false;
};

function drawGenPreview(pts){
  const cv=document.getElementById('gen-preview-canvas');
  cv.style.display='block'; const cx=cv.getContext('2d');
  cv.width=cv.offsetWidth||260; cv.height=50;
  cx.clearRect(0,0,cv.width,cv.height);
  const s=Math.min(cv.width,cv.height)*0.42;
  const[r,g,b]=rgb(editColor);
  const step=Math.max(1,Math.floor(pts.length/300));
  for(let i=0;i<pts.length;i+=step){
    const[x,y]=pts[i];
    cx.beginPath(); cx.arc(x*s+cv.width/2,y*s+cv.height/2,0.85,0,Math.PI*2);
    cx.fillStyle=`rgba(${r},${g},${b},0.8)`; cx.fill();
  }
}

// ── Playback ──
document.getElementById('btn-play').onclick=()=>{
  isPlaying=!isPlaying;
  const btn=document.getElementById('btn-play');
  btn.classList.toggle('playing',isPlaying);
  btn.innerHTML=isPlaying
    ?'<svg width="8" height="10" viewBox="0 0 10 10"><rect x="0" y="0" width="3" height="10" fill="currentColor"/><rect x="5" y="0" width="3" height="10" fill="currentColor"/></svg> Pause'
    :'<svg width="8" height="10" viewBox="0 0 10 12"><polygon points="0,0 10,6 0,12" fill="currentColor"/></svg> Play';
  if(isPlaying){ if(pos>=0.99){pos=0;done.clear();} startPlay(); }
  else { clearInterval(playTimer); playTimer=null; }
};

function startPlay(){
  const dur=sd().dur||60;
  document.getElementById('total').textContent=fmt(dur);
  clearInterval(playTimer);
  playTimer=setInterval(()=>{
    if(!isPlaying){clearInterval(playTimer);return;}
    pos+=0.1/dur;
    if(pos>=1){ pos=1; stop(); return; }
    document.getElementById('elapsed').textContent=fmt(pos*dur);
    document.getElementById('progress-fill').style.width=(pos*100)+'%';
    fireWords(pos);
  },100);
}

function stop(){
  isPlaying=false; clearInterval(playTimer); playTimer=null;
  const btn=document.getElementById('btn-play');
  btn.classList.remove('playing');
  btn.innerHTML='<svg width="8" height="10" viewBox="0 0 10 12"><polygon points="0,0 10,6 0,12" fill="currentColor"/></svg> Play';
}

function fireWords(p){
  const words=sd().words; if(!words||!words.length) return;
  const wc=words.length, wi=Math.min(Math.floor(p*wc),wc-1);
  for(let i=0;i<=wi;i++){
    const w=words[i]; if(!w||!w.tag) continue;
    const k=subjId+':'+i; if(done.has(k)) continue;
    done.add(k);
    bc.postMessage({type:'trigger',shape:w.tag.shape,color:w.tag.color,transition:w.tag.transition,word:w.text,customPoints:w.tag.customPoints||null});
    document.getElementById('preview-word').textContent='"'+w.text+'"';
    document.getElementById('preview-word').style.color=w.tag.color||'var(--accent)';
  }
}

// progress track click
document.getElementById('progress-track').onclick=e=>{
  const rect=e.currentTarget.getBoundingClientRect();
  pos=Math.max(0,Math.min(1,(e.clientX-rect.left)/rect.width));
  document.getElementById('elapsed').textContent=fmt(pos*(sd().dur||60));
  document.getElementById('progress-fill').style.width=(pos*100)+'%';
  done.clear();
};

// ── Save / Load ──
const PFX='insight_v2_';
let pendingSlot=null;

function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2000); }
function saveSlots(){ document.querySelectorAll('.slot').forEach(s=>s.classList.toggle('filled',!!localStorage.getItem(PFX+s.dataset.slot))); }

document.getElementById('btn-save').onclick=()=>{
  document.querySelectorAll('.slot').forEach(s=>{s.style.borderColor='var(--accent)';setTimeout(()=>s.style.borderColor='',1800);});
  toast('Click S1 S2 or S3 to save'); pendingSlot='pick';
};
document.querySelectorAll('.slot').forEach(slot=>slot.onclick=()=>{
  const key=PFX+slot.dataset.slot;
  if(pendingSlot==='pick'){
    sd().script=document.getElementById('script-textarea').value;
    localStorage.setItem(key,JSON.stringify({SD:JSON.parse(JSON.stringify(SD)),at:new Date().toLocaleString()}));
    pendingSlot=null; saveSlots(); toast('Saved to slot '+slot.dataset.slot);
  } else {
    const raw=localStorage.getItem(key);
    if(raw){ try{ const d=JSON.parse(raw); Object.keys(d.SD).forEach(id=>{if(SD[id])Object.assign(SD[id],d.SD[id]);}); switchSubj(subjId); saveSlots(); toast('Loaded slot '+slot.dataset.slot); }catch(e){toast('Error');} }
    else{ document.getElementById('btn-save').onclick(); }
  }
});
(()=>{ const raw=localStorage.getItem(PFX+'1'); if(raw){try{const d=JSON.parse(raw);Object.keys(d.SD).forEach(id=>{if(SD[id])Object.assign(SD[id],d.SD[id]);});}catch(e){}} saveSlots(); })();

// Preview uses iframe — no mini engine needed
window.addEventListener('resize',()=>{});
// init tabs AFTER mini engine is ready
buildTabs();
switchSubj(0);
</script>
