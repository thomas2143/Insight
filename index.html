<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Insight</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400&family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100vh;overflow:hidden;background:#0d0d16;font-family:'Outfit',sans-serif;color:#f0ead8;}
:root{--accent:#b8a47a;}

canvas{display:block;position:fixed;inset:0;width:100%;height:100%;}

/* ── Overlay modes ── */
#library-overlay{
  position:fixed;inset:0;z-index:10;
  display:flex;flex-direction:column;
  background:#0d0d16;
}
#player-ui{display:none;}

/* ── Library header ── */
#lib-header{
  padding:28px 40px 0;display:flex;align-items:flex-end;justify-content:space-between;
}
#lib-logo{
  font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;
  letter-spacing:0.12em;color:#f0ead8;
}
#lib-logo span{color:var(--accent);}
#btn-new{
  padding:7px 18px;font-size:8px;font-weight:300;letter-spacing:0.2em;text-transform:uppercase;
  border:0.5px solid var(--accent);border-radius:2px;cursor:pointer;
  color:var(--accent);background:transparent;transition:all 0.2s;
}
#btn-new:hover{background:var(--accent);color:#05050a;}

/* ── Library grid ── */
#lib-content{flex:1;overflow-y:auto;padding:32px 40px;}
#lib-title{
  font-size:8px;font-weight:200;letter-spacing:0.28em;text-transform:uppercase;
  color:rgba(240,234,216,0.55);margin-bottom:20px;
}
#subjects-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;}

.subject-card{
  border:0.5px solid rgba(255,255,255,0.12);border-radius:3px;padding:16px;
  cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden;
  background:rgba(255,255,255,0.05);
}
.subject-card:hover{border-color:rgba(255,255,255,0.3);background:rgba(255,255,255,0.09);}
.subject-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:var(--card-accent,var(--accent));opacity:0.9;
}
.card-title{font-size:13px;font-weight:300;letter-spacing:0.06em;margin-bottom:6px;color:#f5f0e8;}
.card-meta{font-size:8px;font-weight:200;letter-spacing:0.14em;color:rgba(240,234,216,0.5);}
.card-words{
  margin-top:10px;font-size:8px;font-weight:200;letter-spacing:0.1em;
  color:rgba(240,234,216,0.45);line-height:1.6;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.card-actions{margin-top:12px;display:flex;gap:6px;}
.card-btn{
  padding:4px 10px;font-size:7px;font-weight:200;letter-spacing:0.14em;text-transform:uppercase;
  border:0.5px solid rgba(255,255,255,0.18);border-radius:2px;cursor:pointer;
  color:rgba(240,234,216,0.7);background:transparent;transition:all 0.15s;
}
.card-btn:hover{color:#f0ead8;border-color:rgba(255,255,255,0.45);}
.card-btn.play{border-color:var(--card-accent,var(--accent));color:var(--card-accent,var(--accent));}
.card-btn.play:hover{background:var(--card-accent,var(--accent));color:#05050a;}

#empty-state{
  text-align:center;padding:80px 20px;
  font-size:12px;font-weight:200;letter-spacing:0.12em;color:rgba(240,234,216,0.35);
}
#empty-state strong{display:block;font-size:16px;font-weight:300;margin-bottom:10px;color:rgba(240,234,216,0.65);}

/* ── Player UI ── */
#player-ui{
  position:fixed;inset:0;z-index:5;pointer-events:none;
}
#player-header{
  position:absolute;top:0;left:0;right:0;
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 24px;pointer-events:auto;
}
#player-title{
  font-size:9px;font-weight:200;letter-spacing:0.24em;text-transform:uppercase;
  color:rgba(240,234,216,0.65);
}
#btn-back-lib{
  padding:5px 12px;font-size:7px;font-weight:200;letter-spacing:0.16em;text-transform:uppercase;
  border:0.5px solid rgba(255,255,255,0.25);border-radius:2px;cursor:pointer;
  color:rgba(240,234,216,0.75);background:rgba(5,5,10,0.7);transition:all 0.18s;
}
#btn-back-lib:hover{color:#f0ead8;border-color:rgba(255,255,255,0.3);}

#player-word{
  position:absolute;bottom:100px;left:50%;transform:translateX(-50%);
  font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:300;
  letter-spacing:0.14em;color:var(--accent);opacity:0;transition:opacity 0.4s;
  pointer-events:none;white-space:nowrap;
}

#player-controls{
  position:absolute;bottom:0;left:0;right:0;
  display:flex;align-items:center;justify-content:center;gap:16px;
  padding:20px;pointer-events:auto;
  background:linear-gradient(transparent,rgba(5,5,10,0.7));
}
#player-progress{
  flex:1;max-width:400px;height:1px;background:rgba(255,255,255,0.2);
  position:relative;cursor:pointer;
}
#player-fill{height:100%;background:var(--accent);width:0%;transition:width 0.1s;}
.btn-step{
  width:28px;height:28px;border-radius:50%;border:0.5px solid rgba(255,255,255,0.25);
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  background:transparent;transition:all 0.2s;
}
.btn-step:hover{border-color:rgba(255,255,255,0.5);}
.btn-step svg{fill:rgba(240,234,216,0.7);width:8px;height:8px;}
#btn-play-pause{
  width:38px;height:38px;border-radius:50%;border:0.5px solid rgba(255,255,255,0.35);
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  background:transparent;transition:all 0.2s;
}
#btn-play-pause:hover{border-color:var(--accent);}
#btn-play-pause svg{fill:rgba(240,234,216,0.8);width:11px;height:11px;margin-left:2px;}
#btn-edit-cur{
  padding:5px 12px;font-size:7px;font-weight:200;letter-spacing:0.16em;text-transform:uppercase;
  border:0.5px solid rgba(255,255,255,0.25);border-radius:2px;cursor:pointer;
  color:rgba(240,234,216,0.7);background:transparent;transition:all 0.15s;
}
#btn-edit-cur:hover{color:#f0ead8;}

/* Scrollbar */
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:2px;}
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<!-- Library -->
<div id="library-overlay">
  <div id="lib-header">
    <div id="lib-logo">IN<span>S</span>IGHT</div>
    <button id="btn-new" onclick="location.href='editor.html'">+ New subject</button>
  </div>
  <div id="lib-content">
    <div id="lib-title">Your subjects</div>
    <div id="subjects-grid"></div>
    <div id="empty-state" style="display:none">
      <strong>No subjects yet</strong>
      Create your first subject to get started
    </div>
  </div>
</div>

<!-- Player -->
<div id="player-ui">
  <div id="player-header">
    <div id="player-title"></div>
    <button id="btn-back-lib" onclick="showLibrary()">← Back</button>
  </div>
  <div id="player-word"></div>
  <div id="player-controls">
    <button class="btn-step" id="btn-prev" title="Previous">
      <svg viewBox="0 0 8 10"><polygon points="8,0 0,5 8,10"/></svg>
    </button>
    <button id="btn-play-pause">
      <svg viewBox="0 0 10 12"><polygon points="0,0 10,6 0,12"/></svg>
    </button>
    <button class="btn-step" id="btn-next" title="Next">
      <svg viewBox="0 0 8 10"><polygon points="0,0 8,5 0,10"/></svg>
    </button>
    <div id="player-progress"><div id="player-fill"></div></div>
    <button id="btn-edit-cur">Edit</button>
  </div>
</div>

<script src="engine.js"></script>
<script>
'use strict';

const STORAGE_KEY = 'insight_subjects';

// ── Init engine ──
engineInit(document.getElementById('canvas'));
engineDraw();

// ── Library ──
function loadLibrary(){
  const all = JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]');
  const grid = document.getElementById('subjects-grid');
  const empty = document.getElementById('empty-state');
  grid.innerHTML = '';

  if(!all.length){
    empty.style.display='block';
    return;
  }
  empty.style.display='none';

  all.forEach(subject=>{
    const taggedWords = (subject.words||[]).filter(w=>w.tag);
    const preview = (subject.words||[]).map(w=>w.text).slice(0,12).join(' ');
    const accent = taggedWords[0]?.tag?.color||'#b8a47a';
    const date = subject.updatedAt ? new Date(subject.updatedAt).toLocaleDateString('en',{month:'short',day:'numeric'}) : '';

    const card = document.createElement('div');
    card.className='subject-card';
    card.style.setProperty('--card-accent', accent);
    card.innerHTML=`
      <div class="card-title">${subject.title||'Untitled'}</div>
      <div class="card-meta">${taggedWords.length} tagged words${date?' · '+date:''}</div>
      <div class="card-words">${preview}</div>
      <div class="card-actions">
        <button class="card-btn play">▶ Play</button>
        <button class="card-btn edit">Edit</button>
        <button class="card-btn del">Delete</button>
      </div>
    `;
    card.querySelector('.play').onclick=(e)=>{ e.stopPropagation(); startPlayer(subject); };
    card.querySelector('.edit').onclick=(e)=>{ e.stopPropagation(); location.href='editor.html?id='+subject.id; };
    card.querySelector('.del').onclick=(e)=>{
      e.stopPropagation();
      if(!confirm('Delete "'+( subject.title||'Untitled')+'"?')) return;
      const all2=JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]');
      localStorage.setItem(STORAGE_KEY,JSON.stringify(all2.filter(s=>s.id!==subject.id)));
      loadLibrary();
    };
    grid.appendChild(card);
  });
}

// ── Player ──
let playSubject = null;
let playTimer = null;
let playIdx = 0;
let isPlaying = false;

function startPlayer(subject){
  playSubject = subject;
  // restore custom shapes
  Object.entries(subject.customShapes||{}).forEach(([k,v])=>{ aiShapes[k]=v; });

  document.getElementById('library-overlay').style.display='none';
  document.getElementById('player-ui').style.display='block';
  document.getElementById('player-title').textContent = subject.title||'Untitled';
  document.getElementById('btn-edit-cur').onclick = ()=>location.href='editor.html?id='+subject.id;

  playIdx=0; isPlaying=false;
  updatePlayBtn();
  document.getElementById('player-fill').style.width='0%';
  document.getElementById('player-word').style.opacity='0';

  // show first shape immediately
  const tagged=(subject.words||[]).filter(w=>w.tag);
  if(tagged.length){ fireWord(tagged[0]); }
}

function fireWord(w){
  const col = hexRgb(w.tag.color||'#b8a47a');
  if(w.tag.shape.startsWith('custom_')){
    applyCustomState(w.tag.shape.replace('custom_',''), col, w.tag.transition||'smooth');
  } else {
    applyState(w.tag.shape, col, w.tag.transition||'smooth');
  }
  const pw = document.getElementById('player-word');
  pw.textContent = w.text;
  pw.style.color = w.tag.color||'var(--accent)';
  pw.style.opacity='1';
  setTimeout(()=>pw.style.opacity='0', 800);
}

function playStep(){
  const tagged=(playSubject.words||[]).filter(w=>w.tag);
  if(playIdx>=tagged.length){ stopPlayer(); return; }
  const w=tagged[playIdx];
  fireWord(w);
  document.getElementById('player-fill').style.width=((playIdx+1)/tagged.length*100)+'%';
  playIdx++;
  if(isPlaying){
    const dur=(w.tag.duration||6)*1000;
    playTimer=setTimeout(playStep, dur);
  }
}

function stopPlayer(){
  isPlaying=false; clearTimeout(playTimer); playTimer=null;
  updatePlayBtn();
}

function updatePlayBtn(){
  const btn=document.getElementById('btn-play-pause');
  btn.innerHTML=isPlaying
    ?'<svg viewBox="0 0 10 10" style="margin-left:0"><rect x="0" y="0" width="3" height="10" fill="rgba(240,234,216,0.8)"/><rect x="5" y="0" width="3" height="10" fill="rgba(240,234,216,0.8)"/></svg>'
    :'<svg viewBox="0 0 10 12" style="margin-left:2px"><polygon points="0,0 10,6 0,12" fill="rgba(240,234,216,0.8)"/></svg>';
}

document.getElementById('btn-play-pause').onclick=()=>{
  if(!playSubject) return;
  isPlaying=!isPlaying;
  updatePlayBtn();
  if(isPlaying){
    const tagged=(playSubject.words||[]).filter(w=>w.tag);
    if(playIdx>=tagged.length) playIdx=0; // reset si fin atteinte
    playStep();
  } else {
    clearTimeout(playTimer); playTimer=null;
  }
};

document.getElementById('btn-next').onclick=()=>{
  if(!playSubject) return;
  stopPlayer();
  playStep();
};

document.getElementById('btn-prev').onclick=()=>{
  if(!playSubject) return;
  stopPlayer();
  const tagged=(playSubject.words||[]).filter(w=>w.tag);
  playIdx=Math.max(0, playIdx-2);
  if(tagged.length){ playStep(); }
};

// Keyboard: left/right arrows + space
document.addEventListener('keydown',(e)=>{
  if(!playSubject) return;
  if(e.key==='ArrowRight'||e.key===' '){ e.preventDefault(); stopPlayer(); playStep(); }
  else if(e.key==='ArrowLeft'){ e.preventDefault(); stopPlayer(); const tagged=(playSubject.words||[]).filter(w=>w.tag); playIdx=Math.max(0,playIdx-2); if(tagged.length) playStep(); }
});

function showLibrary(){
  stopPlayer();
  document.getElementById('library-overlay').style.display='flex';
  document.getElementById('player-ui').style.display='none';
  loadLibrary();
}

// ── Boot ──
loadLibrary();
</script>
</body>
</html>
